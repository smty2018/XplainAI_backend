# Project configuration
# Local paths (all relative to project root)
model_cache: "./models/cache"
data_dir: "./data"
output_dir: "./outputs"

# Model settings
vl2_model: "deepseek-ai/deepseek-vl2-tiny"
vl2_repo_path: "./DeepSeek-VL2"
replicate_model: "deepseek-ai/deepseek-vl2"
replicate_model_version: "e5caf557dd9e5dcee46442e1315291ef1867f027991ede8ff95e304d4f734200"
replicate_api_base_url: "https://api.replicate.com/v1"
replicate_api_timeout_seconds: 180
replicate_api_wait_seconds: 60
replicate_poll_interval_seconds: 2
replicate_max_inline_image_bytes: 900000
replicate_max_image_side: 1400
reasoning_model: "deepseek-ai/deepseek-math-7b-instruct"
reasoning_api_model: "deepseek-reasoner"
reasoning_api_base_url: "https://api.deepseek.com"
reasoning_api_timeout_seconds: 180
reasoning_api_retries: 3
reasoning_api_retry_backoff_seconds: 2.0
reasoning_api_max_tokens: 8192
scene_planner_model: "deepseek-reasoner"
scene_planner_max_tokens: 4096
manim_code_model: "deepseek-reasoner"
manim_code_max_tokens: 8192
manim_layout_refiner_model: "deepseek-reasoner"
manim_layout_refiner_max_tokens: 8192
prompt_assets_dir: "./prompt_assets"
use_gpu: false
max_pages: 3

# Processing settings
batch_size: 1
max_new_tokens: 512
max_new_tokens_text: 320
max_new_tokens_image: 260
max_new_tokens_pdf: 320
temperature: 0.1

# Reasoning v1 settings
reasoning_input_max_length: 4096
reasoning_max_new_tokens: 2048
reasoning_temperature: 0.2
reasoning_top_p: 0.95
enable_cache: true
cache_dir: "./cache"
